# ~/.config/sway/conf.d/input.conf

input type:keyboard {
    xkb_layout "latam,us"
    xkb_variant ",altgr-intl"
    xkb_options "grp:alt_shift_toggle" 
    repeat_delay 300
    repeat_rate 50
}

input type:touchpad {
    tap enabled
    natural_scroll enabled
    scroll_method two_finger
    click_method clickfinger
    pointer_accel 0.3
    dwt enabled
    middle_emulation enabled
}

input type:mouse {
    accel_profile flat
    pointer_accel 0
}
